apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-vue
  namespace: kube-vue-system
  labels:
    app: kube-vue
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-vue
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kube-vue
        version: v1.0.0
    spec:
      containers:
      - name: kube-vue
        image: kube-vue:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: VITE_API_BASE_URL
          value: "http://kube-vue-backend:9000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
